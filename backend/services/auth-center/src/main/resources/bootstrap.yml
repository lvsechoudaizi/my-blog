spring:
  application:
    name: auth-center
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: my-blog
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yaml
        namespace: my-blog
        # 加载共享配置
        shared-configs:
          - data-id: common.yml
            refresh: true # 启用自动刷新
        # 加载认证中心专用配置
        extension-configs:
          - data-id: auth-center.yml
            group: DEFAULT_GROUP
            refresh: true
